spring.application.name=passwordle-backend
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Security Secrets (Override these with Environment Variables in Production)
GATEWAY_SECRET=local-dev-gateway-secret
APP_API_KEY=local-dev-api-key

# AWS & DynamoDB
aws.region=eu-north-1
dynamodb.table.daily-levels=password-quest-prod-daily-levels

# Disable DevTools Restart to avoid AWS SDK ClassCastExceptions
spring.devtools.restart.enabled=false
